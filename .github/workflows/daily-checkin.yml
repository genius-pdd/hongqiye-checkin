name: 每日自动签到

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  checkin:
    name: 执行签到
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 签到
        id: checkin
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.BASE_URL }}/api/user/checkin" \
            -H "Authorization: Bearer ${{ secrets.ACCESS_TOKEN }}" \
            -H "New-Api-User: ${{ secrets.USER_ID }}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Origin: ${{ secrets.BASE_URL }}" \
            -H "Referer: ${{ secrets.BASE_URL }}/console/personal")

          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
          echo "$RESPONSE"

      - name: 检查签到结果
        run: |
          RESPONSE='${{ steps.checkin.outputs.response }}'
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "✅ 签到成功！"
          elif echo "$RESPONSE" | grep -q '今日已签到'; then
            echo "ℹ️ 今日已签到"
          else
            echo "❌ 签到失败: $RESPONSE"
            exit 1
          fi
