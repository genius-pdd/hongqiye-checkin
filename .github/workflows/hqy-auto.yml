name: hqy-auto

on:
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: curl -s -X POST ${{ secrets.BASE_URL }}/api/user/checkin -H "Authorization: Bearer ${{ secrets.ACCESS_TOKEN }}" -H "New-Api-User: ${{ secrets.USER_ID }}" -H "Content-Type: application/json"
